name: Docs Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            README.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            docs/**/*.md

      - name: Check for forbidden placeholders
        run: |
          if grep -RInE '\b(TO(DO)|TB(D))\b' README.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md docs; then
            echo "Found forbidden placeholder text."
            exit 1
          fi

      - name: Check relative Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
