server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: oip-application
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/oip}
    username: ${SPRING_DATASOURCE_USERNAME:oip}
    password: ${SPRING_DATASOURCE_PASSWORD:oip}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId}] %logger{36} - %msg%n"

oip:
  ollama:
    enabled: ${OIP_OLLAMA_ENABLED:true}
    base-url: ${OIP_OLLAMA_BASE_URL:http://localhost:11434}
    provider-name: ${OIP_OLLAMA_PROVIDER_NAME:Ollama Local}
    model-name: ${OIP_OLLAMA_MODEL_NAME:llama3.2:1b}
    connect-timeout-seconds: ${OIP_OLLAMA_CONNECT_TIMEOUT_SECONDS:5}
    read-timeout-seconds: ${OIP_OLLAMA_READ_TIMEOUT_SECONDS:120}
  rag:
    search-limit: ${OIP_RAG_SEARCH_LIMIT:5}
    max-context-characters: ${OIP_RAG_MAX_CONTEXT_CHARACTERS:4000}
