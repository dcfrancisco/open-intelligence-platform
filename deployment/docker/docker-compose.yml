services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: oip
      POSTGRES_USER: oip
      POSTGRES_PASSWORD: oip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oip -d oip"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull llama3.2:1b"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    restart: "no"

  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/backend.Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/oip
      SPRING_DATASOURCE_USERNAME: oip
      SPRING_DATASOURCE_PASSWORD: oip
      OIP_OLLAMA_BASE_URL: http://ollama:11434
      OIP_OLLAMA_MODEL_NAME: llama3.2:1b
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  ollama_data:
